name: sangam
description: Sab ka ek hisaab — Full-stack unified kirana ledger
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Auth (local password hashing)
  crypto: ^3.0.3

  # SMS auto-read for UPI payment detection (Android)
  another_telephony: ^0.4.1

  # Local storage
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # Animations
  flutter_animate: ^4.5.2
  lottie: ^3.1.0
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  confetti: ^0.7.0

  # Charts
  fl_chart: ^0.68.0

  # Auth
  local_auth: ^2.3.0
  pin_code_fields: ^8.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Networking
  http: ^1.2.2

  # Notifications
  flutter_local_notifications: ^17.2.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  uuid: ^4.4.2
  timeago: ^3.7.0
  collection: ^1.18.0

  # Sensors for 3D tilt
  sensors_plus: ^6.0.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
